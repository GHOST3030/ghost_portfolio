<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ahmed Allaw — Flutter Developer</title>

  <meta name="description" content="Ahmed Allaw (GHOST) — Flutter Mobile Developer specializing in Riverpod, Supabase, and scalable mobile applications.">
  <meta name="keywords" content="Flutter Developer, Mobile App Developer, Ahmed Allaw, GHOST, Riverpod, Supabase, Yemen">
  <meta name="author" content="Ahmed Allaw">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="Ahmed Allaw — Flutter Developer">
  <meta property="og:description" content="Flutter Mobile Developer building scalable, high-performance applications with clean architecture.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ghost-portfolio.vercel.app">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ahmed Allaw — Flutter Developer">
  <meta name="twitter:description" content="Flutter Mobile Developer. Clean architecture. Real apps.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👻</text></svg>">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #0A0A10; overflow: hidden; }
    #loading {
      position: fixed;
      inset: 0;
      background: #0A0A10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #loading .ghost-logo {
      font-size: 3rem;
      font-family: monospace;
      color: #00FF87;
      letter-spacing: 0.3em;
      animation: pulse 1.5s ease-in-out infinite;
    }
    #loading .bar-track {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading .bar-fill {
      height: 100%;
      width: 0%;
      background: #00FF87;
      border-radius: 2px;
      animation: load 2s ease forwards;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes load { to { width: 100%; } }
  </style>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      const el = document.getElementById('loading');
      if (el) {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 600);
      }
    });
  </script>
</head>
<body>
  <div id="loading">
    <div class="ghost-logo">GHOST</div>
    <div class="bar-track"><div class="bar-fill"></div></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
